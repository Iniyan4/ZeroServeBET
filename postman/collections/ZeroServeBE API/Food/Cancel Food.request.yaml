$kind: http-request
name: Cancel Food
method: POST
url: '{{baseUrl}}/api/v1/food/{{foodId}}/cancel/'
order: 4000
auth:
  type: bearer
  credentials:
    - key: token
      value: '{{accessToken}}'
scripts:
  - type: afterResponse
    language: text/javascript
    code: |-
      pm.test("Status code is 200", function () {
          pm.response.to.have.status(200);
      });
      pm.test("Food cancelled successfully", function () {
          var json = pm.response.json();
          pm.expect(json.success).to.be.true;
      });
