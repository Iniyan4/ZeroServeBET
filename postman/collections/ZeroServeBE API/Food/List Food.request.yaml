$kind: http-request
name: List Food
method: GET
url: '{{baseUrl}}/api/v1/food/'
order: 2000
auth:
  type: bearer
  credentials:
    - key: token
      value: '{{accessToken}}'
scripts:
  - type: afterResponse
    language: text/javascript
    code: |-
      pm.test("Status code is 200", function () {
          pm.response.to.have.status(200);
      });
      pm.test("Returns food list", function () {
          var json = pm.response.json();
          pm.expect(json.success).to.be.true;
          pm.expect(json.data).to.be.an('array');
      });
