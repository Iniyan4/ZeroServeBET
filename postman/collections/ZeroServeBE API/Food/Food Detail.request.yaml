$kind: http-request
name: Food Detail
method: GET
url: '{{baseUrl}}/api/v1/food/{{foodId}}/'
order: 3000
auth:
  type: bearer
  credentials:
    - key: token
      value: '{{accessToken}}'
scripts:
  - type: afterResponse
    language: text/javascript
    code: |-
      pm.test("Status code is 200", function () {
          pm.response.to.have.status(200);
      });
      pm.test("Returns food detail", function () {
          var json = pm.response.json();
          pm.expect(json.success).to.be.true;
          pm.expect(json.data.id).to.equal(parseInt(pm.environment.get("foodId")));
      });
